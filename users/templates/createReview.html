{% extends "master.html" %}
{% block title %}
{{ user.username }}'s Settings 
{% endblock %}
{% block content %}
{% include "nav.html" %}

<div class="reviewDiv">
    <h2> Send in your review for "{{ song.title }}" </h2>
    <h3>{{ song.artist }}</h3>
    <form method="POST">
        {% csrf_token %}
            
        {{ form.as_p }}

        <button type="submit"> Submit </button>
    </form>
</div>

{% endblock %}
